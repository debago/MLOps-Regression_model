version: "3.9"

services:

  mlflow:
    container_name: mlflow
    ports:
    - "${MLFLOW_PORT}:5000"
    volumes:
    - ${MLFLOW_DB_PATH}:/mlflow/db
    - ${MLFLOW_ARTIFACT_PATH}:/mlflow/artifacts

  api:
    container_name: api
    ports:
    - "${API_PORT}:8000"
    environment:
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
      MODEL_URI: "${MODEL_URI}"
    depends_on:
    - mlflow

  trainer:
    profiles:
    - train
    environment:
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI}"
    volumes:
    - ${DATA_PATH}:/app/data

name: Build Push and Deploy to AKS

on:
push:
branches:
- main

env:
IMAGE_TAG: ${{ github.sha }}
AKS_RESOURCE_GROUP: mlops-rg
AKS_CLUSTER_NAME: mlops-aks
K8S_NAMESPACE: mlops

jobs:
build-push-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  # 🔐 Docker login
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # 🐳 Build & Push API
  - name: Build and push API
    uses: docker/build-push-action@v6
    with:
      context: .
      file: api/Dockerfile.rootcontext
      push: true
      tags: debago/iris-api:${{ github.sha }}

  # 🐳 Build & Push MLflow
  - name: Build and push MLflow
    uses: docker/build-push-action@v6
    with:
      context: .
      file: mlflow/Dockerfile
      push: true
      tags: debago/iris-mlflow:${{ github.sha }}

  # 🐳 Build & Push Trainer
  - name: Build and push Trainer
    uses: docker/build-push-action@v6
    with:
      context: .
      file: trainer/Dockerfile
      push: true
      tags: debago/iris-train:${{ github.sha }}

  # 🔄 Replace IMAGE_TAG in manifests
  - name: Inject image tags
    run: |
      sed -i "s|debago/iris-api:IMAGE_TAG|debago/iris-api:${IMAGE_TAG}|g" k8s/api-deployment.yaml
      sed -i "s|debago/iris-mlflow:IMAGE_TAG|debago/iris-mlflow:${IMAGE_TAG}|g" k8s/mlflow-deployment.yaml
      sed -i "s|debago/iris-train:IMAGE_TAG|debago/iris-train:${IMAGE_TAG}|g" k8s/trainer-job.yaml

  # 🔐 Azure login
  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  # 🎯 Get AKS credentials
  - name: Get AKS credentials
    run: |
      az aks get-credentials \
        --resource-group $AKS_RESOURCE_GROUP \
        --name $AKS_CLUSTER_NAME \
        --overwrite-existing

  # 📦 Namespace
  - name: Ensure namespace
    run: |
      kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

  # ⚙️ Apply ConfigMaps
  - name: Apply ConfigMaps
    run: |
      kubectl apply -f k8s/api-configmap.yaml
      kubectl apply -f k8s/mlflow-configmap.yaml
      kubectl apply -f k8s/trainer-configmap.yaml

  # 🔐 Apply Secrets (if exist)
  - name: Apply Secrets
    run: |
      kubectl apply -f k8s/api-secret.yaml || true
      kubectl apply -f k8s/mlflow-secret.yaml || true
      kubectl apply -f k8s/trainer-secret.yaml || true

  # 💾 Apply PVC
  - name: Apply PVC
    run: |
      kubectl apply -f k8s/mlflow-pvc.yaml

  # 🚀 Deploy MLflow
  - name: Deploy MLflow
    run: |
      kubectl apply -f k8s/mlflow-deployment.yaml
      kubectl apply -f k8s/mlflow-service.yaml

  - name: Wait for MLflow
    run: |
      kubectl rollout status deployment/mlflow -n $K8S_NAMESPACE --timeout=300s

  # 🚀 Deploy API
  - name: Deploy API
    run: |
      kubectl apply -f k8s/api-deployment.yaml
      kubectl apply -f k8s/api-service.yaml

  - name: Wait for API
    run: |
      kubectl rollout status deployment/api -n $K8S_NAMESPACE --timeout=300s

  # 📊 Verify
  - name: Verify Deployment
    run: |
      kubectl get pods -n $K8S_NAMESPACE
      kubectl get svc -n $K8S_NAMESPACE
      kubectl get pvc -n $K8S_NAMESPACE
# Step 2: Deployment:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api  #important
  template:
    metadata:
      labels:
        app: api  #must match the selector
    spec:
      containers:
      - name: api
        image: debago/iris-api:dev
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: api-config
        # - name: MLFLOW_TRACKING_URI
        #   value: "http://mlflow:5000"
        # - name: MODEL_URI
        #   value: "models:/iris-model/latest"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "300Mi"
            cpu: "200m"
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
          initialDelaySeconds: 10
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 3
          failureThreshold: 3